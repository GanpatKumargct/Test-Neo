

services:
  api:
    build: .
    container_name: selenium-nlp-api
    env_file:
      - .env
      - .env.docker
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    container_name: selenium-nlp-worker
    env_file:
      - .env
      - .env.docker
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads
    command: celery -A app.worker.celery_app worker --loglevel=info -Q conversion

  db:
    image: postgres:16
    container_name: selenium-nlp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: selenium_converter
    ports:
      - "55432:5432"

  redis:
    image: redis:7
    container_name: selenium-nlp-redis
    ports:
      - "6379:6379"

volumes:
  uploads_data:

